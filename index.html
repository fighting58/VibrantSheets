<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibrantSheets - Premium Spreadsheet</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
    <div id="app">
        <!-- Header / Title Bar -->
        <header class="title-bar">
            <div class="logo">VibrantSheets</div>
            <div class="file-info">
                <span class="filename" contenteditable="true">Untitled Spreadsheet</span>
                <span class="status-badge">Saved</span>
            </div>
            <div class="user-actions">
                <button class="btn-share">Share</button>
                <div class="user-avatar">K</div>
            </div>
        </header>

        <!-- Ribbon Toolbar -->
        <nav class="ribbon">
            <div class="ribbon-tabs">
                <button class="tab active">Home</button>
                <button class="tab">Insert</button>
                <button class="tab">Draw</button>
                <button class="tab">Layout</button>
                <button class="tab">Formulas</button>
                <button class="tab">Data</button>
            </div>
            <div class="ribbon-content">
                <div class="group">
                    <button class="tool-btn" id="btn-bold" title="Bold"><b>B</b></button>
                    <button class="tool-btn" id="btn-italic" title="Italic"><i>I</i></button>
                    <button class="tool-btn" id="btn-underline" title="Underline"><u>U</u></button>
                </div>
                <div class="divider"></div>
                <div class="group">
                    <select id="font-family" class="tool-select">
                        <option value="Inter">Inter</option>
                        <option value="Roboto">Roboto</option>
                        <option value="Outfit">Outfit</option>
                    </select>
                    <input type="number" id="font-size" value="12" class="tool-input">
                </div>
                <div class="divider"></div>
                <div class="group">
                    <button class="tool-btn" id="btn-align-left" title="Align Left">L</button>
                    <button class="tool-btn" id="btn-align-center" title="Align Center">C</button>
                    <button class="tool-btn" id="btn-align-right" title="Align Right">R</button>
                </div>
                <div class="divider"></div>
                <div class="group">
                    <button class="tool-btn tool-btn-text" id="btn-open" title="Open CSV (Ctrl+O)">📂</button>
                    <button class="tool-btn tool-btn-text" id="btn-save" title="Save CSV (Ctrl+S)">💾</button>
                </div>
            </div>
        </nav>

        <!-- Hidden file input for CSV import -->
        <input type="file" id="csv-file-input" accept=".csv,.tsv,.txt" style="display:none">

        <!-- Formula Bar -->
        <div class="formula-bar">
            <div class="cell-address" id="selected-cell-id">A1</div>
            <div class="formula-fx">fx</div>
            <input type="text" id="formula-input" placeholder="Enter formula or value">
        </div>

        <!-- Spreadsheet Grid Content -->
        <main class="grid-container" id="grid-container">
            <!-- Grid will be generated by JS -->
        </main>

        <!-- Status Bar -->
        <footer class="status-bar">
            <div class="sheet-tabs">
                <button class="sheet-tab active">Sheet1</button>
                <button class="sheet-tab add-btn">+</button>
            </div>
            <div class="metrics">
                <span>Items: 0</span>
                <span>Zoom: 100%</span>
            </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
