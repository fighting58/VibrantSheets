<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibrantSheets - Premium Spreadsheet</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <!-- ExcelJS for Excel (.xlsx) support -->
    <script src="https://unpkg.com/exceljs@4.4.0/dist/exceljs.min.js"></script>
</head>
<body class="dark-mode">
    <div id="app">
        <!-- Header / Title Bar -->
        <header class="title-bar">
            <div class="logo">VibrantSheets</div>
            <div class="file-info">
                <span class="filename" contenteditable="true">Untitled Spreadsheet</span>
                <span class="status-badge">Saved</span>
            </div>
            <div class="user-actions">
                <button class="btn-share">Share</button>
                <div class="user-avatar">K</div>
            </div>
        </header>

        <!-- Ribbon Toolbar -->
        <nav class="ribbon">
            <div class="ribbon-tabs">
                <button class="tab active">Home</button>
                <button class="tab">Insert</button>
                <button class="tab">Draw</button>
                <button class="tab">Layout</button>
                <button class="tab">Formulas</button>
                <button class="tab">Data</button>
            </div>
            <div class="ribbon-content">
                <div class="group">
                    <button class="tool-btn" id="btn-bold" title="Bold (Ctrl+B)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg>
                    </button>
                    <button class="tool-btn" id="btn-italic" title="Italic (Ctrl+I)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>
                    </button>
                    <button class="tool-btn" id="btn-underline" title="Underline (Ctrl+U)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v7a6 6 0 0 0 12 0V3"/><line x1="4" y1="21" x2="20" y2="21"/></svg>
                    </button>
                    <button class="tool-btn" id="btn-strike" title="Strikethrough">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4H9a3 3 0 0 0-2.83 4"/><path d="M14 12a4 4 0 0 1 0 8H6"/><line x1="4" y1="12" x2="20" y2="12"/></svg>
                    </button>
                </div>
                <div class="divider"></div>
                <div class="group">
                    <label class="color-picker-wrapper" title="Text Color" for="text-color">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:2px"><polyline points="4 20 20 20"/><path d="M17 13l-5-8-5 8"/><path d="M6 13h12"/></svg>
                        <input type="color" id="text-color" value="#ffffff">
                    </label>
                    <label class="color-picker-wrapper" title="Fill Color" for="bg-color">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:2px"><path d="m19 11-8-8-8.6 8.6a2 2 0 0 0 0 2.8l5.2 5.2c.8.8 2 .8 2.8 0L19 11Z"/><path d="m5 2 5 5"/><path d="M2 13h15"/><path d="M22 20a2 2 0 1 1-4 0c0-1.6 1.7-2.4 2-4 .3 1.6 2 2.4 2 4Z"/></svg>
                        <input type="color" id="bg-color" value="#1e1e1e">
                    </label>
                </div>
                <div class="group">
                    <select id="font-family" class="tool-select">
                        <option value="Inter">Inter</option>
                        <option value="Roboto">Roboto</option>
                        <option value="Outfit">Outfit</option>
                    </select>
                    <input type="number" id="font-size" value="12" class="tool-input">
                </div>
                <div class="divider"></div>
                <div class="group" title="Number Format">
                    <select id="format-type" class="tool-select">
                        <option value="general">General</option>
                        <option value="currency">Currency (KRW)</option>
                        <option value="percentage">Percentage</option>
                        <option value="date">Date</option>
                    </select>
                    <button class="tool-btn tool-btn-text" id="btn-decimal-decrease" title="Decrease Decimal">-</button>
                    <input type="number" id="format-decimals" value="2" min="0" max="10" class="tool-input decimal-input">
                    <button class="tool-btn tool-btn-text" id="btn-decimal-increase" title="Increase Decimal">+</button>
                </div>
                <div class="divider"></div>
                <div class="group">
                    <button class="tool-btn" id="btn-align-left" title="Align Left">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
                    </button>
                    <button class="tool-btn" id="btn-align-center" title="Align Center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="10" x2="6" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="18" y1="18" x2="6" y2="18"/></svg>
                    </button>
                    <button class="tool-btn" id="btn-align-right" title="Align Right">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg>
                    </button>
                </div>
                <div class="divider"></div>
                <div class="group" title="Find / Replace">
                    <input type="text" id="find-input" class="tool-input find-input" placeholder="Find">
                    <input type="text" id="replace-input" class="tool-input find-input" placeholder="Replace">
                    <label class="tool-checkbox"><input type="checkbox" id="find-case">Aa</label>
                    <label class="tool-checkbox"><input type="checkbox" id="find-exact">=</label>
                    <button class="tool-btn tool-btn-text" id="btn-find-prev" title="Previous">◀</button>
                    <button class="tool-btn tool-btn-text" id="btn-find-next" title="Next">▶</button>
                    <button class="tool-btn tool-btn-text" id="btn-replace" title="Replace">R</button>
                    <button class="tool-btn tool-btn-text" id="btn-replace-all" title="Replace All">All</button>
                </div>
                <div class="divider"></div>
                <div class="group" title="Fill Options">
                    <label class="tool-checkbox"><input type="checkbox" id="fill-skip-blanks">Skip Blanks</label>
                </div>
                <div class="divider"></div>
                <div class="group" title="Custom Lists">
                    <button class="tool-btn tool-btn-text" id="btn-custom-lists" title="Custom Lists">List</button>
                </div>
                <div class="divider"></div>
                <div class="group">
                    <button class="tool-btn" id="btn-open" title="Open (Ctrl+O)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-folder-open"><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H19a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H20a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                    <button class="tool-btn" id="btn-save" title="Save (Ctrl+S)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-save"><path d="M15.2 3H19a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.8"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/><path d="M7 3v4a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V3"/></svg>
                    </button>
                    <button class="tool-btn" id="btn-save-as" title="Save As...">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-save-all"><path d="M10 2v3a1 1 0 0 0 1 1h5"/><path d="M18 18v-6a1 1 0 0 0-1-1h-6a1 1 0 0 0-1 1v6"/><path d="M18 22H4a2 2 0 0 1-2-2V6"/><path d="M8 18a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h6.8l5.2 5.2V16a2 2 0 0 1-2 2Z"/></svg>
                    </button>
                </div>
                <div class="divider"></div>
                <div class="group" title="Table Operations">
                    <button class="tool-btn" id="btn-insert-row" title="Insert Row Above">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="12" y1="6" x2="12" y2="12"/><line x1="9" y1="9" x2="15" y2="9"/></svg>
                    </button>
                    <button class="tool-btn" id="btn-delete-row" title="Delete Current Row">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="15" y2="9"/></svg>
                    </button>
                    <div class="divider-small"></div>
                    <button class="tool-btn" id="btn-insert-col" title="Insert Column Left">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="6" y1="12" x2="12" y2="12"/><line x1="9" y1="9" x2="9" y2="15"/></svg>
                    </button>
                    <button class="tool-btn" id="btn-delete-col" title="Delete Current Column">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="6" y1="12" x2="12" y2="12"/></svg>
                    </button>
                </div>
            </div>
        </nav>

        <!-- Hidden file input for CSV/XLSX/VSHT import -->
        <input type="file" id="csv-file-input" accept=".vsht,.xlsx,.xls,.csv,.tsv,.txt" style="display:none">

        <!-- Formula Bar -->
        <div class="formula-bar">
            <div class="cell-address" id="selected-cell-id">A1</div>
            <div class="formula-fx">fx</div>
            <input type="text" id="formula-input" placeholder="Enter formula or value">
        </div>

        <!-- Spreadsheet Grid Content -->
        <main class="grid-container" id="grid-container">
            <!-- Grid will be generated by JS -->
        </main>

        <!-- Status Bar -->
        <footer class="status-bar">
            <div class="sheet-tabs">
                <button class="sheet-tab active">Sheet1</button>
                <button class="sheet-tab add-btn">+</button>
            </div>
            <div class="metrics">
                <span>Items: 0</span>
                <span>Zoom: 100%</span>
            </div>
        </footer>
    </div>
    <!-- Custom Confirm Modal -->
    <div id="confirm-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.55);align-items:center;justify-content:center;">
        <div style="background:var(--panel-bg,#1e2433);border:1px solid var(--border-color,#3a3f55);border-radius:12px;padding:28px 32px;min-width:280px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.5);">
            <p id="confirm-message" style="margin:0 0 20px;font-size:14px;color:var(--text-primary,#e0e6f0);line-height:1.5;"></p>
            <div style="display:flex;gap:10px;justify-content:center;">
                <button id="confirm-cancel" style="padding:8px 22px;border-radius:8px;border:1px solid var(--border-color,#3a3f55);background:transparent;color:var(--text-primary,#e0e6f0);cursor:pointer;font-size:13px;">취소</button>
                <button id="confirm-ok" style="padding:8px 22px;border-radius:8px;border:none;background:#e05555;color:#fff;cursor:pointer;font-size:13px;font-weight:600;">삭제</button>
            </div>
        </div>
    </div>
    <!-- Custom Lists Modal -->
    <div id="custom-list-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.55);align-items:center;justify-content:center;">
        <div style="background:var(--panel-bg,#1e2433);border:1px solid var(--border-color,#3a3f55);border-radius:12px;padding:22px 24px;min-width:320px;max-width:520px;width:80%;box-shadow:0 8px 32px rgba(0,0,0,.5);">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
                <h3 style="margin:0;font-size:15px;color:var(--text-primary,#e0e6f0);">Custom Lists</h3>
                <button id="custom-list-close" style="border:none;background:transparent;color:var(--text-secondary,#94a3b8);cursor:pointer;font-size:18px;">×</button>
            </div>
            <p style="margin:0 0 10px;font-size:12px;color:var(--text-secondary,#94a3b8);line-height:1.4;">
                한 줄에 하나의 리스트를 입력하세요. 항목은 쉼표로 구분됩니다.
            </p>
            <textarea id="custom-list-input" rows="8" style="width:100%;background:var(--bg-color,#0f172a);border:1px solid var(--border-color,#3a3f55);color:var(--text-primary,#e0e6f0);border-radius:8px;padding:10px;font-size:12px;line-height:1.4;resize:vertical;"></textarea>
            <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px;">
                <button id="custom-list-cancel" style="padding:8px 16px;border-radius:8px;border:1px solid var(--border-color,#3a3f55);background:transparent;color:var(--text-primary,#e0e6f0);cursor:pointer;font-size:13px;">취소</button>
                <button id="custom-list-save" style="padding:8px 16px;border-radius:8px;border:none;background:var(--accent-color,#38bdf8);color:#0f172a;cursor:pointer;font-size:13px;font-weight:600;">저장</button>
            </div>
        </div>
    </div>
    <script src="formula_engine.js"></script>
    <script src="app.js"></script>
</body>
</html>
